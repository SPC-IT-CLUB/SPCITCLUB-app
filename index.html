<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPC IT Club</title>

<style>
*{box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{margin:0;background:linear-gradient(135deg,#020617,#0f172a);color:white;}

header{text-align:center;padding:15px;position:relative;}
#logo{width:80px;border-radius:50%;}
#profileBtn{position:absolute;top:15px;right:15px;width:50px;height:50px;border-radius:50%;overflow:hidden;border:2px solid #38bdf8;display:none;cursor:pointer;}
#profileBtn img{width:100%;height:100%;object-fit:cover;}

#profileMenu{
  position:absolute;
  top:70px;
  right:15px;
  background:#1e293b;
  border-radius:12px;
  display:none;
  width:150px;
  overflow:hidden;
}
#profileMenu button{
  width:100%;
  background:none;
  border:none;
  color:#38bdf8;
  padding:10px;
  cursor:pointer;
}

.page{display:none;padding:20px;padding-bottom:90px;}
.active{display:block;}

.card{
  background:rgba(255,255,255,0.05);
  border-radius:16px;
  padding:15px;
  margin-bottom:10px;
}

nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#0f172a;
  padding:10px 0;
}
nav button{background:none;border:none;color:#94a3b8;}
nav button.active{color:#38bdf8;}

input,button{padding:10px;border-radius:8px;border:none;width:100%;margin-top:5px;}
button{background:#38bdf8;color:black;font-weight:bold;}
</style>
</head>

<body>

<header>
<img id="logo" src="https://avatars.githubusercontent.com/u/243899719?s=400">
<h2>SPC IT Club</h2>

<div id="profileBtn" onclick="toggleMenu()">
  <img id="profilePic" src="https://via.placeholder.com/50">
</div>

<div id="profileMenu">
  <button onclick="uploadPic()">Change Picture</button>
  <button onclick="logout()">Logout</button>
  <input type="file" id="fileInput" style="display:none" onchange="savePic(event)">
</div>
</header>

<!-- LOGIN -->
<div id="login" class="page active">
  <h3>Login</h3>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p id="error"></p>
</div>

<!-- HOME -->
<div id="home" class="page">
  <h3>Welcome</h3>
</div>

<!-- ANNOUNCEMENTS -->
<div id="announcements" class="page">
  <h3>Announcements</h3>
  <div id="announcementsContainer"></div>
</div>

<!-- EVENTS -->
<div id="events" class="page">
  <h3>Events</h3>
  <div id="eventsContainer"></div>
</div>

<nav id="nav" style="display:none;">
  <button onclick="showPage('home',this)" class="active">Home</button>
  <button onclick="showPage('announcements',this)">Announcements</button>
  <button onclick="showPage('events',this)">Events</button>
</nav>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzzvNcHFA1vNl7wGIp_3wQSPybcmBxlYtxYdZQ0ays0tdMxD0WulYFIOYjw76Kxa1MD6Q/exec";

let currentUser = null;
let refreshTimer = null;

// LOGIN
async function login(){
  const form = new FormData();
  form.append("action","login");
  form.append("username",user.value);
  form.append("password",pass.value);

  const res = await fetch(URL,{method:"POST",body:form});
  const data = await res.json();

  if(data.success){
    currentUser = user.value;

    loginPage(false);

    profileBtn.style.display="block";
    profilePic.src = data.profilePic || "https://via.placeholder.com/50";

    // LOAD IMMEDIATELY
    loadAnnouncements();
    loadEvents();

    // START TIMER
    if(refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(loadAnnouncements,30000);

  } else {
    error.innerText="Invalid login";
  }
}

// SHOW/HIDE LOGIN
function loginPage(show){
  login.style.display = show ? "block" : "none";
  nav.style.display = show ? "none" : "flex";
  home.classList.add("active");
}

// NAV
function showPage(id,btn){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  btn.classList.add("active");
}

// PROFILE MENU
function toggleMenu(){
  profileMenu.style.display = profileMenu.style.display==="block" ? "none":"block";
}

function uploadPic(){
  fileInput.click();
}

// SAVE PIC
async function savePic(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = async function(){
    profilePic.src = reader.result;

    const form = new FormData();
    form.append("action","savePic");
    form.append("username",currentUser);
    form.append("pic",reader.result);

    await fetch(URL,{method:"POST",body:form});
  }

  reader.readAsDataURL(file);
}

// LOGOUT
function logout(){
  currentUser=null;

  nav.style.display="none";
  profileBtn.style.display="none";
  profileMenu.style.display="none";

  login.style.display="block";

  if(refreshTimer) clearInterval(refreshTimer);
}

// ANNOUNCEMENTS (Sheet + Discord)
async function loadAnnouncements(){
  announcementsContainer.innerHTML="";

  // SHEET
  const res1 = await fetch(`${URL}?action=getAnnouncements`);
  const data1 = await res1.json();

  if(data1.success){
    data1.announcements.forEach(a=>{
      announcementsContainer.innerHTML += `
      <div class="card">
        <b>${a.title}</b>
        <p>${a.content}</p>
        <small>${a.createdBy}</small>
      </div>`;
    });
  }

  // DISCORD
  const res2 = await fetch(`${URL}?action=getDiscord`);
  const data2 = await res2.json();

  if(data2.success){
    data2.messages.forEach(m=>{
      announcementsContainer.innerHTML += `
      <div class="card">
        <b>${m.username}</b>
        <p>${m.content}</p>
      </div>`;
    });
  }
}

// EVENTS
async function loadEvents(){
  eventsContainer.innerHTML="";

  const res = await fetch(`${URL}?action=getEvents`);
  const data = await res.json();

  if(data.success){
    data.events.forEach(e=>{
      eventsContainer.innerHTML += `
      <div class="card">
        <b>${e.title}</b>
        <p>${e.date} ${e.time}</p>
        <p>${e.description}</p>
      </div>`;
    });
  }
}
</script>

</body>
</html>
