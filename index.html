<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPC IT CLUB APP</title>
<style>
:root { --primary:#800020; --gold:#FFD100; }
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f4f4f4;}
.app{max-width:800px;margin:auto;min-height:100vh;background:white;border-radius:16px;overflow:hidden;box-shadow:0 0 25px rgba(0,0,0,0.1);position:relative;}
header{display:flex;justify-content:center;align-items:center;background:var(--primary);color:var(--gold);padding:20px;font-size:1.8rem;font-weight:bold;position:relative;}
header h1#appButton{flex:1;text-align:center;margin:0;cursor:pointer;user-select:none;transition:transform 0.2s;}
header h1#appButton:hover{transform:scale(1.05);}
.content{padding:20px;text-align:center;}
#announcementsContainer{text-align:left;}
.announcement{background:var(--gold);color:var(--primary);padding:15px;border-radius:14px;margin:15px 0;}
.announcement img{width:100%;border-radius:10px;margin-bottom:10px;}
.announcement h3{margin:0 0 5px 0;}
.admin-controls{margin-top:10px;}
.admin-controls button{padding:6px 10px;margin-right:5px;font-size:0.8rem;cursor:pointer;}
.popup{position:fixed;inset:0;backdrop-filter:blur(10px);background:rgba(0,0,0,0.3);display:flex;justify-content:center;align-items:flex-end;opacity:0;pointer-events:none;transition:0.3s;z-index:100;}
.popup.active{opacity:1;pointer-events:all;}
.popup-content{width:90%;max-width:480px;background:white;border-radius:20px 20px 0 0;padding:20px;transform:translateY(100%);transition:0.3s;}
.popup.active .popup-content{transform:translateY(0);}
input,textarea{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #ccc;font-size:1rem;}
button.primary{background:var(--primary);color:var(--gold);border:none;padding:12px;border-radius:10px;font-weight:bold;width:100%;margin-top:10px;}
@media(min-width:768px){.popup-content{max-width:500px;} header{font-size:2rem;}}
</style>
</head>
<body>

<div class="app">
<header>
<h1 id="appButton">SPC IT CLUB APP</h1>
</header>
<div class="content">
<h2>Announcements</h2>
<div id="announcementsContainer"></div>
</div>
</div>

<!-- Admin Login -->
<div id="adminLogin" class="popup">
<div class="popup-content">
<h3>Admin Login</h3>
<input type="password" id="adminPassword" placeholder="Enter password">
<button class="primary" id="loginBtn">Login</button>
<button class="primary" onclick="closePopup('adminLogin')">Cancel</button>
</div>
</div>

<!-- Post Popup -->
<div id="postPopup" class="popup">
<div class="popup-content">
<h3 id="postTitle">New Announcement</h3>
<input type="text" id="titleInput" placeholder="Title">
<textarea id="contentInput" rows="3" placeholder="Announcement text"></textarea>
<input type="file" id="thumbnailInput" accept="image/*">
<button class="primary" id="savePostBtn">Send</button>
<button class="primary" onclick="closePopup('postPopup')">Cancel</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDiN7DkL1KwVsntRjDkU3dHAnOp1zmwNoI",
  authDomain: "spcitapp.firebaseapp.com",
  projectId: "spcitapp",
  storageBucket: "spcitapp.firebasestorage.app",
  messagingSenderId: "713788616271",
  appId: "1:713788616271:web:e44c20b347a680c1a5043a"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

const ADMIN_PASSWORD = "admin123";
let isAdmin = false;
let editingId = null;

const openPopup = id => document.getElementById(id).classList.add("active");
const closePopup = id => document.getElementById(id).classList.remove("active");

// Secret header login
document.getElementById("appButton").addEventListener("click", () => openPopup('adminLogin'));

// Admin login
document.getElementById("loginBtn").addEventListener("click", () => {
  const pass = document.getElementById("adminPassword").value;
  if(pass === ADMIN_PASSWORD){
    isAdmin = true;
    closePopup('adminLogin');
    openPostPopup(); // optional new post
  } else alert("Wrong password");
});

// Open post popup
async function openPostPopup(id=null){
  editingId = id;
  document.getElementById("postTitle").innerText = id ? "Edit Announcement" : "New Announcement";
  document.getElementById("titleInput").value = "";
  document.getElementById("contentInput").value = "";
  document.getElementById("thumbnailInput").value = "";

  if(id){
    const docRef = doc(db,"announcements",id);
    const docSnap = await getDoc(docRef);
    if(docSnap.exists()){
      const data = docSnap.data();
      document.getElementById("titleInput").value = data.title;
      document.getElementById("contentInput").value = data.content;
    }
  }
  openPopup('postPopup');
}

// Save post
document.getElementById("savePostBtn").addEventListener("click", async ()=>{
  if(!isAdmin) return alert("You must be logged in as admin!");
  const title = document.getElementById("titleInput").value.trim();
  const content = document.getElementById("contentInput").value.trim();
  const file = document.getElementById("thumbnailInput").files[0];

  if(!title || !content) return alert("Title and content required");

  let imageUrl = null;
  if(file){
    const storageRef = ref(storage,'thumbnails/'+file.name+Date.now());
    await uploadBytes(storageRef,file);
    imageUrl = await getDownloadURL(storageRef);
  }

  if(editingId){
    await updateDoc(doc(db,"announcements",editingId),{
      title, content, image: imageUrl, date: new Date().toLocaleString()
    });
  } else{
    await addDoc(collection(db,"announcements"),{
      title, content, image: imageUrl, date: new Date().toLocaleString()
    });
  }

  closePopup('postPopup');
});

// Delete post
async function deletePost(id){
  if(!isAdmin) return alert("You must be logged in as admin!");
  if(!confirm("Delete this post?")) return;
  await deleteDoc(doc(db,"announcements",id));
}

// Render announcements with dynamic buttons
const announcementsContainer = document.getElementById("announcementsContainer");

function renderAnnouncements(){
  onSnapshot(collection(db,"announcements"), snapshot=>{
    announcementsContainer.innerHTML = "";
    snapshot.forEach(docSnap=>{
      const post = docSnap.data();
      const id = docSnap.id;
      const div = document.createElement("div");
      div.className = "announcement";

      // Announcement HTML
      let innerHTML = "";
      if(post.image) innerHTML += `<img src="${post.image}">`;
      innerHTML += `<h3>${post.title}</h3><p>${post.content}</p><small>${post.date}</small>`;
      div.innerHTML = innerHTML;

      // Admin buttons dynamically
      if(isAdmin){
        const controls = document.createElement("div");
        controls.className = "admin-controls";

        const editBtn = document.createElement("button");
        editBtn.textContent = "Edit";
        editBtn.onclick = () => openPostPopup(id);

        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "Delete";
        deleteBtn.onclick = () => deletePost(id);

        controls.appendChild(editBtn);
        controls.appendChild(deleteBtn);
        div.appendChild(controls);
      }

      announcementsContainer.appendChild(div);
    });
  });
}

// Start real-time listener
renderAnnouncements();
</script>
</body>
</html>
